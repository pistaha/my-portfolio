<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Этап 3: Bootstrap 5 и Luxon</title>
    <script type="module" crossorigin src="./assets/index-C0IWZC7y.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-WBhvOPX7.css">
  </head>
  <body>
    <main class="container py-5 min-vh-100 d-flex align-items-center">
      <section class="row w-100 align-items-center">
        <div class="col-12 col-lg-2"></div>

        <div class="col-12 col-lg-8">
          <div class="button-wrap">
            <button
              id="showTimeButton"
              type="button"
              class="btn btn-danger btn-lg w-100 h-100"
            >
              Показать время
            </button>
          </div>
        </div>

        <div class="col-12 col-lg-2"></div>
      </section>
    </main>

    <div
      class="modal fade"
      id="timeModal"
      tabindex="-1"
      aria-labelledby="timeModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="timeModalLabel">
              Выполнил: Рыбаков Ярослав
            </h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Закрыть"
            ></button>
          </div>

          <div class="modal-body py-4 text-center">
            <p id="timeValue" class="time-value mb-0">--.--.---- --:--:--</p>
          </div>

          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Закрыть
            </button>
          </div>
        </div>
      </div>
    </div>

  </body>
</html>
