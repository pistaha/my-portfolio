<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite 2025 Lab</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background:
          linear-gradient(160deg, rgba(25, 135, 84, 0.16), transparent 40%),
          linear-gradient(135deg, #f6fff9 0%, #eefcf4 50%, #ffffff 100%);
      }

      .clock-card {
        border: 0;
        border-radius: 2rem;
        box-shadow: 0 24px 60px rgba(25, 135, 84, 0.16);
        background: rgba(255, 255, 255, 0.93);
      }

      #hh {
        font-size: clamp(2.8rem, 9vw, 7rem);
        line-height: 1;
        letter-spacing: 0.08em;
        font-weight: 800;
      }
    </style>
  </head>
  <body class="d-flex align-items-center">
    <main class="container py-5">
      <section class="row justify-content-center">
        <div class="col-12 col-xl-10">
          <div class="clock-card p-4 p-md-5 text-center">
            <h1 id="hh" class="mb-4">--.--.---- --:--:--</h1>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="/src/vite.js"></script>
  </body>
</html>
