<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webpack 2025 Lab</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background:
          radial-gradient(circle at top, rgba(13, 110, 253, 0.18), transparent 35%),
          linear-gradient(135deg, #f8fbff 0%, #eef4ff 50%, #ffffff 100%);
      }

      .clock-card {
        border: 0;
        border-radius: 2rem;
        box-shadow: 0 24px 60px rgba(13, 110, 253, 0.18);
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(14px);
      }

      #hh {
        font-size: clamp(2.8rem, 9vw, 7rem);
        line-height: 1;
        letter-spacing: 0.08em;
        font-weight: 800;
      }
    </style>
  </head>
  <body class="d-flex align-items-center">
    <main class="container py-5">
      <section class="row justify-content-center">
        <div class="col-12 col-xl-10">
          <div class="clock-card p-4 p-md-5 text-center">
            <p class="text-uppercase text-primary fw-semibold mb-3">Webpack + Luxon + Bootstrap CDN</p>
            <h1 id="hh" class="mb-4">--.--.---- --:--:--</h1>
            <p class="lead mb-0 text-secondary">
              Время обновляется каждую секунду и форматируется через Luxon.
            </p>
          </div>
        </div>
      </section>
    </main>
    <script src="./dist/main.js"></script>
  </body>
</html>
