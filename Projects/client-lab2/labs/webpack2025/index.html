<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Интеграция Bootstrap 5 и Luxon</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(180deg, #eef6ff 0%, #dfeefe 100%);
      }

      .button-wrap {
        min-height: 220px;
        display: flex;
      }

      .time-value {
        font-size: clamp(2rem, 4vw, 3.5rem);
        line-height: 1.15;
        font-weight: 800;
        letter-spacing: 0.03em;
      }
    </style>
  </head>

  <body class="d-flex align-items-center">
    <main class="container py-5">
      <section class="row align-items-center p-4 p-lg-5">
        <div class="col-12 col-lg-2"></div>

        <div class="col-12 col-lg-8">
          <div class="button-wrap">
            <button
              id="showTimeButton"
              type="button"
              class="btn btn-danger btn-lg w-100 h-100 py-3"
            >
              Показать время
            </button>
          </div>
        </div>

        <div class="col-12 col-lg-2"></div>
      </section>
    </main>

    <div
      class="modal fade"
      id="timeModal"
      tabindex="-1"
      aria-labelledby="timeModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header">
            <h2 class="modal-title fs-5" id="timeModalLabel">
              Выполнил: Рыбаков Ярослав
            </h2>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Закрыть"
            ></button>
          </div>

          <div class="modal-body py-4 text-center">
            <p id="timeValue" class="time-value mb-0">--.--.---- --:--:--</p>
          </div>

          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Закрыть
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      const showTimeButton = document.getElementById('showTimeButton');
      const timeValue = document.getElementById('timeValue');
      const timeModalElement = document.getElementById('timeModal');

      const timeModal = new bootstrap.Modal(timeModalElement);

      showTimeButton.addEventListener('click', function () {
        timeValue.textContent = luxon.DateTime
          .local()
          .setLocale('ru')
          .toFormat('dd.LL.yyyy HH:mm:ss');

        timeModal.show();
      });
    </script>
  </body>
</html>
