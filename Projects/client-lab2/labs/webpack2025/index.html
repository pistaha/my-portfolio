<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Luxon Demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background:
          radial-gradient(circle at top, rgba(220, 53, 69, 0.16), transparent 34%),
          linear-gradient(135deg, #fff7f8 0%, #fff1f3 48%, #ffffff 100%);
      }

      .app-shell {
        border-radius: 2rem;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 24px 80px rgba(123, 31, 40, 0.12);
        backdrop-filter: blur(14px);
      }

      .time-value {
        font-size: clamp(2rem, 4vw, 3.5rem);
        line-height: 1.15;
        font-weight: 800;
        letter-spacing: 0.03em;
      }
    </style>
  </head>
  <body class="d-flex align-items-center">
    <main class="container py-5">
      <section class="app-shell row align-items-center gy-4 p-4 p-lg-5">
        <div class="col-12 col-lg-2"></div>
        <div class="col-12 col-lg-8">
          <div class="text-center">
            <h1 class="display-6 fw-bold mb-3">Bootstrap 5 + Luxon</h1>
            <p class="text-body-secondary mb-4">
              Нажмите на кнопку, чтобы открыть модальное окно с текущей датой и временем.
            </p>
            <button id="showTimeButton" type="button" class="btn btn-danger btn-lg w-100 py-3">
              Показать время
            </button>
          </div>
        </div>
        <div class="col-12 col-lg-2"></div>
      </section>
    </main>

    <div class="modal fade" id="timeModal" tabindex="-1" aria-labelledby="timeModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header">
            <h2 class="modal-title fs-5" id="timeModalLabel">Выполнил: Рыбаков Ярослав</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
          </div>
          <div class="modal-body py-4 text-center">
            <p id="timeValue" class="time-value mb-0">--.--.---- --:--:--</p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
          </div>
        </div>
      </div>
    </div>

    <script src="./dist/main.js"></script>
  </body>
</html>
